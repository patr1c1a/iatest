<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Test de usuario de IA para descubrir tu perfil de usuario y obtener consejos para usar IA personalizados."
    />
    <title>Test gratuito de perfil de usuario de IA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body>
    <noscript>
      <div class="noscript-banner">
        Este sitio necesita JavaScript para ejecutar el test y mostrar tu
        resultado.
      </div>
    </noscript>

    <div class="page-shell">
      <header class="site-header" style="display: none">
        <div class="test-header">
          <button
            type="button"
            class="header-back"
            data-action="previous-step"
            aria-label="Volver"
          >
            <svg
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.8"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M19 12H5"></path>
              <path d="M12 19l-7-7 7-7"></path>
            </svg>
          </button>

          <a
            class="header-title"
            href="index.html?home=1"
            aria-label="Volver al inicio"
          >
            Test gratuito: ¿Cómo te relacionas con la IA?
          </a>

          <div id="questionCounter" class="header-counter">1/10</div>
        </div>

        <div class="progress-bar" aria-hidden="true">
          <div id="progressFill" class="progress-fill"></div>
        </div>
      </header>

      <main
        id="app"
        class="app-card"
        aria-live="polite"
        aria-busy="true"
      ></main>
    </div>

    <script
      src="https://challenges.cloudflare.com/turnstile/v0/api.js"
      async
      defer
    ></script>

    <script type="module" src="assets/js/app.js"></script>
  </body>
</html>
